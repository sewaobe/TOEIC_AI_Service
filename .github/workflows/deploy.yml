name: CI/CD Pipeline for FastAPI Deployment

# Trigger the workflow on push to master branch
on:
  push:
    branches:
      - master

jobs:
  build-and-push: # Build Docker image and push to registry
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/toeic-fast-api:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/toeic-fast-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy: # Deploy to VPS using Ansible
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Infrastructure code
        uses: actions/checkout@v3
        with:
          repository: sewaobe/TOEIC_ansible
          token: ${{ secrets.MY_GITHUB_TOKEN }}
          path: ansible-code

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts

      - name: Create inventory file
        run: |
          mkdir -p ansible-code/ansible/inventories/production
          echo "[webservers]" > ansible-code/ansible/inventories/production/hosts.ini
          echo "toeic-vps ansible_host=${{ secrets.VPS_HOST }} ansible_user=${{ secrets.VPS_USER }} ansible_ssh_private_key_file=~/.ssh/id_ed25519" >> ansible-code/ansible/inventories/production/hosts.ini

      - name: Install Ansible
        run: |
          pip install ansible

      - name: Run Ansible Playbook
        run: |
          ansible-playbook -i ansible-code/ansible/inventories/production/hosts.ini \
            ansible-code/ansible/playbooks/deploy_fastapi.yml \
            -e "image_name=${{ secrets.DOCKERHUB_USERNAME }}/toeic-fast-api:${{ github.sha }}"
